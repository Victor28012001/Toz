<!DOCTYPE html>
<html>
  <head>
    <title>Authenticating...</title>
    <style>
      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0a0a1a;
        font-family: "Orbitron", monospace;
        color: #14f195;
      }
      .msg {
        text-align: center;
        padding: 40px;
        border: 1px solid rgba(20, 241, 149, 0.3);
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.8);
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(20, 241, 149, 0.2);
        border-top-color: #14f195;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="msg">
      <div class="spinner"></div>
      <div>Authentication successful!</div>
      <div style="font-size: 12px; margin-top: 10px;">Redirecting...</div>
    </div>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const error = params.get("error");
        const success = params.get("success");

        console.log("oauth-done.html loaded", { success, error });

        // Function to send message and close
        function sendAndClose(type, payload) {
          // Try multiple targets
          const targets = [];
          
          if (window.opener && !window.opener.closed) {
            targets.push(window.opener);
          }
          if (window.parent && window.parent !== window) {
            targets.push(window.parent);
          }
          
          // Also try to find the main window by name
          if (window.opener && window.opener.opener) {
            targets.push(window.opener.opener);
          }
          
          for (const target of targets) {
            try {
              target.postMessage({ type, ...payload }, "*");
              console.log("Posted message to target:", type);
            } catch (e) {
              console.warn("Failed to post to target:", e);
            }
          }
          
          // Keep the popup open for a moment to ensure message is sent
          setTimeout(() => {
            window.close();
          }, 1000);
        }

        if (error) {
          sendAndClose("CIVIC_AUTH_ERROR", {
            error: decodeURIComponent(error),
          });
        } else if (success === "true" || success === true) {
          sendAndClose("CIVIC_AUTH_SUCCESS", { success: true });
        } else {
          // No params, assume success
          sendAndClose("CIVIC_AUTH_SUCCESS", { success: true });
        }
      })();
    </script>
  </body>
</html>
