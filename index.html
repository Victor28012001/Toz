<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TOZ</title>
    <link rel="stylesheet" href="style.css">
    <!-- Orbitron for UIFlow (fallback if Google Fonts unavailable) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Chat (hidden until game starts) -->
    <div id="chat" style="display:none;">
        <div id="messages">
            <div id="messagesInner">
                <table id="messageList"></table>
            </div>
        </div>
    </div>

    <div id="react-root" ></div>

    <!-- Message input (hidden until game starts) -->
    <div id="chatInput" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;">
        <input id="txtMessage" type="text" placeholder="Press Enter to chat..." autocomplete="off">
    </div>

    <!-- Vite entry point -->
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
